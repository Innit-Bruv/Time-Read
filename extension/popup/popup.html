<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TimeRead</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Main View -->
    <div id="main-view">
      <div class="header">
        <h1>TimeRead</h1>
        <div class="tab-bar">
          <button class="tab-btn active" id="tab-save">Save</button>
          <button class="tab-btn" id="tab-queue">Queue <span id="queue-badge" class="queue-badge hidden"></span></button>
        </div>
      </div>

      <!-- Save Tab -->
      <div id="save-tab">
        <div id="page-info">
          <p id="page-title" class="page-title">Loading...</p>
          <p id="page-url" class="page-url"></p>
        </div>

        <button id="save-btn" class="btn-primary">Save to TimeRead</button>
        <div id="status" class="status hidden"></div>
        <button id="settings-btn" class="btn-link">⚙ Settings</button>
      </div>

      <!-- Queue Tab -->
      <div id="queue-tab" class="hidden">
        <div id="queue-list">
          <div id="queue-empty" class="queue-empty">
            No saves yet — right-click any link or use the Save button
          </div>
        </div>
        <button id="clear-done-btn" class="btn-link hidden">Clear completed</button>
      </div>
    </div>

    <!-- Settings View -->
    <div id="settings-view" class="hidden">
      <div class="header">
        <h1>Settings</h1>
      </div>

      <label>API URL</label>
      <input id="api-url" type="url" placeholder="https://api.yourdomain.com">

      <label>API Token</label>
      <input id="api-token" type="password" placeholder="Your INTERNAL_API_SECRET">

      <div class="toggle-row">
        <label for="twitter-sync">Auto-sync Twitter bookmarks (hourly)</label>
        <input id="twitter-sync" type="checkbox">
      </div>

      <button id="save-settings-btn" class="btn-primary">Save Settings</button>
      <button id="back-btn" class="btn-link">← Back</button>

      <div id="settings-status" class="status hidden"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
